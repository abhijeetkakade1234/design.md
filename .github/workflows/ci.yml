name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check types
      run: npx tsc --noEmit
      
    - name: Lint
      run: npm run lint
      
    - name: Build
      run: npm run build
      env:
        # These are dummy values for the build process to pass
        VITE_FIREBASE_API_KEY: "dummy"
        VITE_FIREBASE_AUTH_DOMAIN: "dummy"
        VITE_FIREBASE_PROJECT_ID: "dummy"
        VITE_FIREBASE_STORAGE_BUCKET: "dummy"
        VITE_FIREBASE_MESSAGING_SENDER_ID: "dummy"
        VITE_FIREBASE_APP_ID: "dummy"
        VITE_GEMINI_API_KEY: "dummy"
